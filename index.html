<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주기율표 실험실 & 타임어택 게임</title>
    
    <!-- PWA 및 모바일 최적화 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    
    <!-- Google Fonts (Noto Sans KR) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ✅ CDN 영구 고정 (라이브러리 자동 업데이트로 인한 먹통 방지) -->

    <!-- 모바일 환경 iOS 하단 잘림 현상 방지를 위한 동적 vh 세팅 -->
    <script>
        const setVH = () => document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
        window.addEventListener('resize', setVH);
        setVH();
    </script>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            user-select: none;
            -webkit-user-select: none;
        }
        /* iOS Safari 등에서 모바일 주소창을 고려한 동적 100vh 세팅 */
        .min-h-screen-safe {
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.15);
        }
        
        /* Lab Animations */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-pulse-slow { animation: pulse-slow 4s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s infinite ease-in-out; }

        /* Time Attack Game Animations */
        @keyframes shakeCell {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-3deg); }
            75% { transform: translateX(6px) rotate(3deg); }
        }
        .shake-animation { animation: shakeCell 0.35s ease; }
        
        @keyframes hintFlash {
            0%, 100% { box-shadow: none; border-color: rgba(56, 189, 248, 0.1); }
            50% { box-shadow: 0 0 20px #fde047; border-color: #fde047; background-color: rgba(253, 224, 71, 0.2); }
        }
        .hint-flash-animation { animation: hintFlash 0.8s ease 2; z-index: 10; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.25s ease-out; }

        /* Game Categories */
        .cat-alkali { background: rgba(153, 27, 27, 0.4); border-color: #f87171; }
        .cat-alkaline { background: rgba(146, 64, 14, 0.4); border-color: #fb923c; }
        .cat-lanthanide { background: rgba(153, 27, 27, 0.2); border-color: #fb7185; }
        .cat-actinide { background: rgba(22, 101, 52, 0.4); border-color: #4ade80; }
        .cat-transition { background: rgba(30, 58, 138, 0.4); border-color: #60a5fa; }
        .cat-post { background: rgba(22, 101, 52, 0.2); border-color: #34d399; }
        .cat-metalloid { background: rgba(63, 98, 18, 0.4); border-color: #a3e635; }
        .cat-nonmetal { background: rgba(88, 28, 135, 0.4); border-color: #c084fc; }
        .cat-halogen { background: rgba(133, 77, 14, 0.4); border-color: #facc15; }
        .cat-noble { background: rgba(15, 118, 110, 0.4); border-color: #2dd4bf; }

        /* 빈 셀 하단 색상 바 전용 클래스 */
        .bar-alkali { background-color: #f87171; }
        .bar-alkaline { background-color: #fb923c; }
        .bar-lanthanide { background-color: #fb7185; }
        .bar-actinide { background-color: #4ade80; }
        .bar-transition { background-color: #60a5fa; }
        .bar-post { background-color: #34d399; }
        .bar-metalloid { background-color: #a3e635; }
        .bar-nonmetal { background-color: #c084fc; }
        .bar-halogen { background-color: #facc15; }
        .bar-noble { background-color: #2dd4bf; }
        
        /* 캔버스 터치 최적화 (가장 중요한 부분) */
        canvas { touch-action: none; }
    </style>
</head>

        const playTone = (freqs, type, dur) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!window._audioCtx) window._audioCtx = new AudioContext();
                const ctx = window._audioCtx;
                if (ctx.state === 'suspended') ctx.resume();
                freqs.forEach((f, i) => {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = type || 'sine';
                    o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
                    g.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + dur);
                    o.start(ctx.currentTime + i * 0.12);
                    o.stop(ctx.currentTime + i * 0.12 + dur);
                });
            } catch(e) {}
        };

        class AtomVisualizer {
            constructor(canvas, elementData, highlightOuter = true) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.element = elementData;
                this.highlightOuter = highlightOuter;
                this.electrons = [];
                this.photons = [];
                this.nucleusPulse = 0;
                this.running = true;
                this.electronSpeedMultiplier = 1.0;
                this.initElectrons();
            }
            initElectrons() {
                this.electrons = [];
                const shells = this.element.shells;
                const totalShells = shells.length;
                shells.forEach((count, sIdx) => {
                    const radius = 65 + sIdx * 35;
                    const speed = 0.05 / (sIdx + 1);
                    const isOuterShell = (sIdx === totalShells - 1);
                    for (let i = 0; i < count; i++) {
                        this.electrons.push({ shellIndex: sIdx, radius, angle: (i / count) * Math.PI * 2 + Math.random() * 0.5, speed, baseSpeed: speed, isOuter: isOuterShell });
                    }
                });
            }
            emitPhoton(color) {
                for (let i = 0; i < 3; i++) {
                    this.photons.push({ x: this.canvas.width / 2, y: this.canvas.height / 2, radius: 10, opacity: 1, speed: 2 + i * 1.5, color });
                }
            }
            draw() {
                if (!this.running) return;
                const ctx = this.ctx;
                const canvas = this.canvas;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                ctx.fillStyle = 'rgba(2, 6, 23, 0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = 'rgba(14, 165, 233, 0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(cx, cy, 180, 0, Math.PI * 2); ctx.stroke();

                const sCount = this.element.shells.length;
                for (let i = 0; i < sCount; i++) {
                    const r = 65 + i * 35;
                    const isOuterShell = (i === sCount - 1);
                    ctx.strokeStyle = isOuterShell && this.highlightOuter ? 'rgba(245, 158, 11, 0.45)' : 'rgba(56, 189, 248, 0.25)';
                    ctx.lineWidth = isOuterShell && this.highlightOuter ? 2 : 1.2;
                    ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
                    ctx.fillStyle = isOuterShell && this.highlightOuter ? 'rgba(245, 158, 11, 0.8)' : 'rgba(56, 189, 248, 0.4)';
                    ctx.font = 'bold 9px sans-serif';
                    ctx.fillText(`${['K', 'L', 'M', 'N'][i] || i+1}껍질${isOuterShell && this.highlightOuter ? ' (바깥)' : ''}`, cx + r - 20, cy - 6);
                }

                this.photons.forEach((p, idx) => {
                    p.radius += p.speed; p.opacity -= 0.015;
                    if (p.opacity <= 0) { this.photons.splice(idx, 1); return; }
                    ctx.strokeStyle = p.color; ctx.globalAlpha = p.opacity; ctx.lineWidth = 2; ctx.beginPath();
                    for (let a = 0; a < Math.PI * 2; a += 0.1) {
                        const waveR = p.radius + Math.sin(a * 16) * 5;
                        const wx = cx + Math.cos(a) * waveR;
                        const wy = cy + Math.sin(a) * waveR;
                        if (a === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
                    }
                    ctx.closePath(); ctx.stroke(); ctx.globalAlpha = 1.0;
                });

                this.nucleusPulse += 0.03;
                const nRadius = 25 + Math.sin(this.nucleusPulse) * 1.5;
                const grad = ctx.createRadialGradient(cx, cy, 5, cx, cy, nRadius + 15);
                grad.addColorStop(0, 'rgba(239, 68, 68, 0.45)');
                grad.addColorStop(0.5, 'rgba(59, 130, 246, 0.3)');
                grad.addColorStop(1, 'rgba(2, 6, 23, 0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, nRadius + 20, 0, Math.PI * 2); ctx.fill();

                const clusterCount = Math.min(this.element.protons, 12);
                for (let i = 0; i < clusterCount; i++) {
                    const angle = (i / clusterCount) * Math.PI * 2 + this.nucleusPulse * 0.1;
                    const offset = 8 + (i % 2 === 0 ? 3 : 0);
                    const px = cx + Math.cos(angle) * offset;
                    const py = cy + Math.sin(angle) * offset;
                    const isProton = i % 2 === 0;
                    const pGrad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, 6);
                    if (isProton) { pGrad.addColorStop(0, '#fca5a5'); pGrad.addColorStop(1, '#ef4444'); }
                    else { pGrad.addColorStop(0, '#93c5fd'); pGrad.addColorStop(1, '#2563eb'); }
                    ctx.fillStyle = pGrad; ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 8px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(isProton ? '+' : 'n', px, py);
                }

                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)'; ctx.shadowColor = '#000000'; ctx.shadowBlur = 4;
                ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(`${this.element.symbol}`, cx, cy - 1); ctx.shadowBlur = 0;

                this.electrons.forEach((e) => {
                    e.angle += e.speed * this.electronSpeedMultiplier;
                    const ex = cx + Math.cos(e.angle) * e.radius;
                    const ey = cy + Math.sin(e.angle) * e.radius;
                    const useHighlight = e.isOuter && this.highlightOuter;
                    ctx.shadowColor = useHighlight ? '#f59e0b' : '#38bdf8'; ctx.shadowBlur = 8;
                    const eGrad = ctx.createRadialGradient(ex - 1.5, ey - 1.5, 0.5, ex, ey, 5.5);
                    if (useHighlight) { eGrad.addColorStop(0, '#fef3c7'); eGrad.addColorStop(0.4, '#f59e0b'); eGrad.addColorStop(1, '#d97706'); }
                    else { eGrad.addColorStop(0, '#e0f2fe'); eGrad.addColorStop(0.4, '#38bdf8'); eGrad.addColorStop(1, '#0284c7'); }
                    ctx.fillStyle = eGrad; ctx.beginPath(); ctx.arc(ex, ey, 5.5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
                    ctx.fillStyle = '#020617'; ctx.font = 'bold 9px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('-', ex, ey - 0.5);
                });
            }
        }

                const payload = {
                    type: 'lab', teacherKey: TEACHER_KEY,
                    timestamp: new Date().toLocaleString(),
                    studentId, studentName,
                    visitedCount: stats.visitedElements.size,
                    excitationCount: stats.excitationCount,
                    maxOuterElectrons: stats.maxOuterElectrons,
                    quizScore: `${correctCount}/${randomQuizzes.length}`,
                    insight
                };
                try {
                    const res = await Promise.race([
                        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
                    ]);
                    setIsLoading(false); 
                    navigate('done');
                } catch (e) {
                    setIsLoading(false); triggerCustomAlert("❌ 오류 발생", "서버 전송 실패. 네트워크를 확인하거나 Apps Script 주소를 점검하세요.");
                }
            };

            const getTaPool = () => {
                if (taDiff === '초급') return GAME_ELEMENTS.filter(e => e.n <= 20);
                if (taDiff === '중급') return GAME_ELEMENTS.filter(e => e.period <= 4);
                if (taDiff === '고급') return GAME_ELEMENTS.filter(e => e.period <= 5);
                return GAME_ELEMENTS;
            };

            const startTaGame = () => {
                const pool = getTaPool();
                const shuffled = [...pool].sort(() => 0.5 - Math.random());
                setTaQueue(shuffled);
                setTaCurrent(shuffled[0]);
                setTaFilled(new Set());
                setTaCorrect(0); setTaWrong(0); setTaWrongStreak(0); setTaIsLocked(false); setTaSubmitStatus(''); 
                
                // === 게임 화면 진입 시에도 뒤로가기 처리를 위해 pushState ===
                setTaView('playing');
                window.history.pushState({ view: 'ta_playing' }, '');
                // ========================================================

                const hasAdv = taHint !== 'all';
                taStartTime.current = Date.now() + (hasAdv ? 3000 : 0);
                const tick = () => { setTaTimer((Date.now() - taStartTime.current) / 1000); taAnimFrame.current = requestAnimationFrame(tick); };
                cancelAnimationFrame(taAnimFrame.current);
                taAnimFrame.current = requestAnimationFrame(tick);
            };

            const endTaGame = useCallback(() => {
                cancelAnimationFrame(taAnimFrame.current);
                setTaTimer(Math.max(0, (Date.now() - taStartTime.current) / 1000));
                
                // === 결과 화면 진입 ===
                setTaView('result'); 
                window.history.pushState({ view: 'ta_result' }, '');
                // =====================
                
                playComplete();
            }, []);

            const giveUpTaGame = () => {
                cancelAnimationFrame(taAnimFrame.current);
                setTaView('intro');
                triggerCustomAlert('🏳️ 게임 포기', '타임어택을 중단하고 처음 화면으로 돌아왔습니다.');
            };

            const handleTaCellClick = (n) => {
                if (taIsLocked || taView !== 'playing' || !taCurrent || taFilled.has(n)) return;
                if (n === taCurrent.n) {
                    playCorrect();
                    setTaFilled(prev => { const next = new Set(prev); next.add(n); return next; });
                    setTaCorrect(prev => prev + 1); setTaWrongStreak(0);
                    const nextQueue = taQueue.slice(1);
                    setTaQueue(nextQueue);
                    if (nextQueue.length === 0) endTaGame(); else setTaCurrent(nextQueue[0]);
                } else {
                    playWrong(); setTaWrong(prev => prev + 1);
                    const currentStreak = taWrongStreak + 1;
                    setTaWrongStreak(currentStreak);
                    setTaWrongFlash({ id: n, trigger: Date.now() });
                    setTaIsLocked(true);
                    if (currentStreak >= 3) setTaHintFlash({ id: taCurrent.n, trigger: Date.now() });
                    setTimeout(() => setTaIsLocked(false), 1200);
                }
            };

            const submitTaRanking = async () => {
                if (!taSubmitName.trim()) { triggerCustomAlert("❗ 정보 확인", "이름을 정확히 입력해주세요."); return; }
                if (!GOOGLE_SCRIPT_URL) { triggerCustomAlert("❗ 연결 불가", "교사 DB 스크립트가 등록되지 않았습니다."); return; }
                setTaSubmitStatus('로딩중');
                const payload = { type: 'game', teacherKey: TEACHER_KEY, timestamp: new Date().toLocaleString(), playerName: taSubmitName.trim(), difficulty: taDiff, hintMode: taHint, elapsedTime: taTimer.toFixed(2) };
                try {
                    await Promise.race([
                        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
                    ]);
                    setTaSubmitStatus('완료');
                } catch(e) { setTaSubmitStatus('에러'); }
            };

            const fetchRankings = async () => {
                if (!GOOGLE_SCRIPT_URL) { triggerCustomAlert("❗ 연결 불가", "DB 주소가 설정되지 않아 명예의 전당을 불러올 수 없습니다."); return; }
                setRankingsLoading(true); setShowRankings(true);
                // 모달 열 때 히스토리 푸시하여 뒤로가기 시 모달 닫힘 연동
                window.history.pushState({ modal: 'ranking' }, '');
                try {
                    const res = await Promise.race([
                        fetch(`${GOOGLE_SCRIPT_URL}?action=getRankings`),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
                    ]);
                    const data = await res.json();
                    setRankingsData(data || []);
                } catch (e) { 
                    console.error("랭킹 호출 오류:", e); 
                    setRankingsData([]); 
                    // 에러 시 커스텀 얼럿 대체 모달
                    triggerCustomAlert("통신 실패", "랭킹 서버 연결에 실패했습니다.");
                }
                finally { setRankingsLoading(false); }
            };

            // === [뒤로가기 방지 및 단계별 라우팅 핵심 로직] ===
            
            // 1. 상태 전환 헬퍼 함수 (모든 화면 이동은 이 함수를 통함)
            const navigate = (nextView) => {
                setView(nextView);
                window.history.pushState({ view: nextView }, '');
            };

            // 2. 초기 렌더링 시 브라우저 히스토리 스택 초기화
            useEffect(() => {
                window.history.replaceState({ view: 'intro', mode: mainMode }, '');
            }, []);

            // 3. 브라우저 뒤로가기(popstate) 이벤트 핸들러
            useEffect(() => {
                const handlePopState = (e) => {
                    const state = e.state;
                    
                    // a) 최상위 강제 모달(가이드, 커스텀 얼럿, 로딩)이 띄워져 있다면 모달을 닫음
                    if (customAlert) {
                        closeCustomAlert();
                        // 브라우저는 뒤로 갔으므로 다시 현재 상태를 복구해둠
                        window.history.pushState(state, ''); 
                        return;
                    } 
                    if (isLoading) {
                        // 통신 중단 방어
                        window.history.pushState(state, '');
                        return;
                    }
                    
                    // b) 일반 모달(랭킹) 처리
                    if (showRankings) {
                        setShowRankings(false);
                        return;
                    }
                    if (showGuide) {
                        setShowGuide(false);
                        return;
                    }

                    // c) 실험실 모드 화면 라우팅
                    if (mainMode === 'lab') {
                        if (view === 'report') {
                            setView('simulation');
                        } else if (view === 'simulation') {
                            setView('intro');
                        } else if (view === 'done') {
                            setView('intro'); // done에서 뒤로가기 시 초기화
                            setUserAnswers({});
                            setShowExplanation({});
                            setInsight('');
                        } else {
                            // 최초 화면에서 뒤로가기 시 앱 밖으로 튕김 방지
                            window.history.pushState({ view: 'intro' }, '');
                        }
                    } 
                    // d) 게임 모드 화면 라우팅
                    else if (mainMode === 'game') {
                        if (taView === 'playing') {
                            giveUpTaGame(); // 뒤로가기 누르면 게임 포기 처리
                        } else if (taView === 'result') {
                            setTaView('intro');
                        } else {
                            window.history.pushState({ view: 'ta_intro' }, '');
                        }
                    }
                };

                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, [customAlert, isLoading, showRankings, showGuide, mainMode, view, taView]);
            // =======================================================


            const getCategoryColor = (category) => {
                switch(category) {
                    case 'nonmetal': return 'bg-purple-950 border-purple-500 hover:bg-purple-900/50';
                    case 'noble': return 'bg-teal-950 border-teal-500 hover:bg-teal-900/50';
                    case 'alkali': return 'bg-red-950 border-red-500 hover:bg-red-900/50';
                    case 'alkaline-earth': return 'bg-orange-950 border-orange-500 hover:bg-orange-900/50';
                    case 'metalloid': return 'bg-lime-950 border-lime-500 hover:bg-lime-900/50';
                    default: return 'bg-blue-950 border-blue-500 hover:bg-blue-900/50';
                }
            };

            const renderLab = () => (
                <main className="flex-grow flex flex-col p-4 md:p-6 max-w-7xl w-full mx-auto justify-center">
                    {view === 'intro' && (
                        <div className="max-w-3xl mx-auto w-full text-center py-8 px-4 flex flex-col items-center">
                            <div className="relative w-48 h-48 mb-8 animate-float">
                                <div className="absolute inset-0 rounded-full border border-brand-500/30 animate-pulse-slow"></div>
                                <div className="absolute inset-4 rounded-full border border-purple-500/20 animate-pulse"></div>
                                <div className="absolute inset-8 rounded-full border border-emerald-500/20 animate-ping" style={{ animationDuration: '3s' }}></div>
                                <div className="absolute inset-0 flex items-center justify-center text-6xl">🔬</div>
                            </div>
                            <h2 className="text-3xl md:text-4xl font-extrabold mb-4 tracking-tight leading-tight">원자의 규칙을 찾아서 <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-cyan-300">원자 구조와 주기율표 탐구</span></h2>
                            <p className="text-slate-400 text-sm md:text-base max-w-xl mb-8 leading-relaxed">원자핵의 양성자 수와 전자 껍질의 규칙성을 확인해보세요. 원자번호에 따른 '가장 바깥 전자 수'의 주기성을 직관적으로 관찰할 수 있습니다.</p>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 w-full mb-8 text-left">
                                <div className="p-4 rounded-xl border border-brand-500/10 bg-slate-900/50"><div className="text-xl mb-1">🌟 <b>실시간 원자 모형</b></div><p className="text-xs text-slate-400">보어 모형 기반 1~20번 원소 전자 배치 시각화</p></div>
                                <div className="p-4 rounded-xl border border-brand-500/10 bg-slate-900/50"><div className="text-xl mb-1">🔍 <b>주기적 규칙 발견</b></div><p className="text-xs text-slate-400">족과 주기에 따른 원자가 전자의 변화 탐구</p></div>
                                <div className="p-4 rounded-xl border border-brand-500/10 bg-slate-900/50"><div className="text-xl mb-1">📝 <b>탐구 보고서 제출</b></div><p className="text-xs text-slate-400">퀴즈를 풀고 알게 된 점을 구글 시트에 기록</p></div>
                            </div>
                            <button onClick={() => navigate('simulation')} className="bg-gradient-to-r from-brand-600 to-cyan-500 hover:from-brand-500 hover:to-cyan-400 text-white font-bold text-lg px-8 py-4 rounded-xl shadow-[0_0_20px_rgba(14,165,233,0.3)] active:scale-95 transition-all w-full sm:w-auto">🚀 실험 가상 연구소 입장하기</button>
                        </div>
                    )}

                    {view === 'simulation' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 w-full">
                            <div className="lg:col-span-7 flex flex-col gap-6">
                                <div className="glass-panel rounded-2xl p-4 md:p-5 flex flex-col gap-3">
                                    <div className="flex items-center justify-between"><h3 className="text-sm font-semibold text-brand-300">📊 주기율표 선택 패널 (H - Ca)</h3><span className="text-[10px] text-slate-400">원소를 클릭하면 궤도 모형이 로딩됩니다.</span></div>
                                    <div className="grid grid-cols-8 gap-1 text-center text-xs mt-2 w-full">
                                        {ELEMENT_DATA.map((el, i) => {
                                            const isSelected = el === selectedElement;
                                            const needGap = (i === 0) ? 6 : 0;
                                            return (
                                                <React.Fragment key={el.no}>
                                                    <button onClick={() => selectElementAndLog(el)} className={`p-1.5 rounded-lg border flex flex-col items-center justify-center font-bold h-10 md:h-12 transition-all ${isSelected ? 'ring-2 ring-brand-400 scale-105 z-10' : ''} ${getCategoryColor(el.category)}`}>
                                                        <span className="text-[9px] text-slate-400">{el.no}</span><span className="text-sm">{el.symbol}</span>
                                                    </button>
                                                    {needGap > 0 && <div style={{ gridColumn: `span ${needGap} / span ${needGap}` }}></div>}
                                                </React.Fragment>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="glass-panel rounded-2xl p-4 md:p-5 flex flex-col gap-3">
                                    <h4 className="font-bold text-sm text-brand-300">🔍 원소 백과사전 및 특징</h4>
                                    <div className="border-t border-slate-800 pt-3">
                                        <div className="flex items-baseline gap-2 mb-1.5"><span className="text-2xl font-black text-brand-400">{selectedElement.symbol}</span><span className="text-sm font-semibold">{selectedElement.name} (번호 {selectedElement.no})</span></div>
                                        <p className="text-xs text-slate-300 bg-slate-900/40 p-3 rounded-lg border border-slate-800">{selectedElement.desc}</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mt-1.5 text-xs">
                                        <div className="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800"><div className="text-slate-400 mb-0.5">양성자 수 (핵전하량)</div><div className="font-bold text-red-400">+{selectedElement.protons}</div></div>
                                        <div className="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800"><div className="text-slate-400 mb-0.5">총 전자 수</div><div className="font-bold text-brand-400">-{selectedElement.protons}</div></div>
                                        <div className="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800"><div className="text-slate-400 mb-0.5">전자 껍질 (주기)</div><div className="font-bold text-fuchsia-400">{selectedElement.period}주기</div></div>
                                        <div className="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800"><div className="text-slate-400 mb-0.5">가장 바깥 전자 (족)</div><div className="font-bold text-amber-400">{selectedElement.group}족 ({selectedElement.shells[selectedElement.shells.length - 1]}개)</div></div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-5 flex flex-col gap-6">
                                <div className="glass-panel rounded-2xl p-4 flex flex-col relative overflow-hidden">
                                    <span className="text-xs bg-slate-900/80 px-2.5 py-1 rounded-full border border-brand-500/20 text-brand-300 font-medium w-max mb-3">⚛️ 보어 원자 궤도 모형</span>
                                    {/* 캔버스 최소 높이 지정 방어 */}
                                    <div className="relative w-full aspect-square min-h-[280px] bg-slate-950 rounded-xl overflow-hidden border border-brand-500/10 shadow-[inner_0_0_20px_rgba(14,165,233,0.1)]"><canvas ref={canvasRef} className="w-full h-full block touch-none"></canvas></div>
                                    <div className="mt-4 flex flex-col gap-4">
                                        <div className="bg-slate-900/50 p-3 rounded-lg border border-slate-800/80 flex items-center justify-between">
                                            <div className="flex flex-col gap-0.5"><span className="text-xs font-semibold text-amber-300">💡 원자가 전자 강조</span><span className="text-[10px] text-slate-400">바깥 껍질 전자를 금색으로 밝힙니다.</span></div>
                                            <button onClick={() => setHighlightOuter(!highlightOuter)} className={`px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95 ${highlightOuter ? 'bg-amber-500 text-slate-950' : 'bg-slate-800 text-slate-400'}`}>{highlightOuter ? '켜짐' : '꺼짐'}</button>
                                        </div>
                                        <div className="flex items-center justify-between gap-4"><input type="range" min="0.2" max="2.5" step="0.1" value={speed} onChange={(e) => setSpeed(parseFloat(e.target.value))} className="w-full accent-brand-500 h-1 bg-slate-800 rounded-lg cursor-pointer"/><button onClick={triggerExcitation} className="bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold text-xs px-4 py-3 rounded-lg shrink-0">✨ 에너지 자극</button></div>
                                    </div>
                                </div>
                                <div className="glass-panel rounded-2xl p-4 flex flex-col gap-3"><button onClick={() => navigate('report')} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl active:scale-95 shadow-[0_0_15px_rgba(16,185,129,0.2)]">📝 원자 구조 탐구 보고서 작성 ➔</button></div>
                            </div>
                        </div>
                    )}

                    {view === 'report' && (
                        <div className="max-w-3xl mx-auto w-full flex flex-col gap-6">
                            <div className="glass-panel rounded-2xl p-5 md:p-6 flex flex-col gap-4"><h3 className="font-bold text-sm text-brand-300 border-b border-slate-800 pb-2">👤 학생 인적 정보 입력</h3><div className="grid grid-cols-2 gap-4"><input type="number" placeholder="학번 (예: 2201)" value={studentId} onChange={(e) => setStudentId(e.target.value)} className="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2.5 text-sm" /><input type="text" placeholder="이름" value={studentName} onChange={(e) => setStudentName(e.target.value)} className="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2.5 text-sm" /></div></div>
                            <div className="glass-panel rounded-2xl p-5 flex flex-col gap-4">
                                <h3 className="font-bold text-sm text-brand-300 border-b border-slate-800 pb-2">📝 OX 퀴즈</h3>
                                <div className="flex flex-col gap-4">
                                    {randomQuizzes.map((quiz, qIdx) => {
                                        const isAnswered = userAnswers[quiz.id] !== undefined;
                                        const isCorrect = userAnswers[quiz.id] === quiz.a;
                                        return (
                                            <div key={quiz.id} className="p-4 rounded-xl bg-slate-950 border border-slate-800">
                                                <p className="text-sm font-semibold mb-3">Q{qIdx + 1}. {quiz.q}</p>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <button onClick={() => { setUserAnswers(p => ({...p, [quiz.id]: true})); setShowExplanation(p => ({...p, [quiz.id]: true})); }} disabled={isAnswered} className={`py-2 rounded-lg font-black transition-all ${userAnswers[quiz.id] === true ? (quiz.a ? 'bg-emerald-600/30 text-emerald-300 border border-emerald-500' : 'bg-red-600/30 text-red-300 border border-red-500') : 'bg-slate-900'} ${isAnswered && userAnswers[quiz.id] !== true ? 'opacity-40' : ''}`}>⭕ O</button>
                                                    <button onClick={() => { setUserAnswers(p => ({...p, [quiz.id]: false})); setShowExplanation(p => ({...p, [quiz.id]: true})); }} disabled={isAnswered} className={`py-2 rounded-lg font-black transition-all ${userAnswers[quiz.id] === false ? (!quiz.a ? 'bg-emerald-600/30 text-emerald-300 border border-emerald-500' : 'bg-red-600/30 text-red-300 border border-red-500') : 'bg-slate-900'} ${isAnswered && userAnswers[quiz.id] !== false ? 'opacity-40' : ''}`}>❌ X</button>
                                                </div>
                                                {showExplanation[quiz.id] && <div className={`mt-3 p-3 rounded-lg text-xs border ${isCorrect ? 'bg-emerald-950/40 border-emerald-500/20 text-emerald-300' : 'bg-red-950/40 border-red-500/20 text-red-300'}`}><b>{isCorrect ? '정답!' : '오답!'}</b> {quiz.explain}</div>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="glass-panel rounded-2xl p-5 flex flex-col gap-4"><h3 className="font-bold text-sm text-brand-300 border-b border-slate-800 pb-2">📑 알게 된 점</h3><textarea rows="3" placeholder="주기율표의 가로줄(주기)과 세로줄(족)에 따른 전자 규칙성에 대해 배운 점을 쓰세요..." value={insight} onChange={(e) => setInsight(e.target.value)} className="bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm resize-none"></textarea></div>
                            <div className="flex gap-3"><button onClick={() => navigate('simulation')} className="bg-slate-900 border border-slate-800 py-3.5 px-6 rounded-xl w-auto shrink-0">◀ 돌아가기</button><button onClick={submitLabData} className="bg-brand-600 hover:bg-brand-500 text-white font-bold py-3.5 rounded-xl flex-grow">🚀 통합 보고서 제출하기</button></div>
                        </div>
                    )}

                    {view === 'done' && (
                        <div className="max-w-md mx-auto w-full text-center py-12 px-6 glass-panel rounded-2xl"><span className="text-6xl animate-bounce block mb-4">🎓</span><h2 className="text-2xl font-bold mb-2">제출 완료!</h2><p className="text-slate-400 text-sm mb-6">보고서가 시트에 기록되었습니다. 전송 방식 특성 상 브라우저가 전송 완료 검증을 하지 못하므로 오류가 없더라도 시트를 확인해주세요.</p><button onClick={() => { navigate('intro'); setUserAnswers({}); setShowExplanation({}); setInsight(''); }} className="bg-slate-900 border border-slate-800 py-3 px-6 rounded-xl w-full hover:bg-slate-800">🔄 다시 시작</button></div>
                    )}
                </main>
            );

            const renderTimeAttack = () => {
                const isCompact = taDiff === '초급';
                const gridColsClass = isCompact ? 'grid-cols-8' : 'grid-cols-18';
                const totalCount = getTaPool().length;
                return (
                    <main className="flex-grow flex flex-col p-4 md:p-6 w-full mx-auto justify-center max-w-6xl">
                        {taView === 'intro' && (
                            <div className="max-w-md mx-auto w-full text-center">
                                <div className="mb-8"><h1 className="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-2">⚗️ 주기율표<br/>타임어택</h1><p className="text-slate-400 text-sm">빈 주기율표에서 원소의 위치를 빠르게 찾아라!</p></div>
                                <div className="glass-panel rounded-2xl p-5 mb-5"><h3 className="text-sm text-slate-400 mb-3 text-left font-bold">🎯 난이도 선택</h3><div className="grid grid-cols-2 gap-2">{[{ id: '초급', icon: '🟢', desc: '1~20번' },{ id: '중급', icon: '🟡', desc: '1~4주기' },{ id: '고급', icon: '🔴', desc: '1~5주기' },{ id: '극악', icon: '💀', desc: '전체 118개' }].map(d => (<button key={d.id} onClick={() => setTaDiff(d.id)} className={`p-3 rounded-xl border-2 transition-all flex flex-col items-center ${taDiff === d.id ? 'border-cyan-400 bg-cyan-950/40 text-cyan-400' : 'border-slate-800 bg-slate-900/50 text-slate-500 hover:border-slate-700'}`}><span className="text-2xl mb-1">{d.icon}</span><span className="font-bold text-sm text-slate-200">{d.id}</span><span className="text-[10px] opacity-70">{d.desc}</span></button>))}</div></div>
                                <div className="glass-panel rounded-2xl p-5 mb-6"><h3 className="text-sm text-slate-400 mb-3 text-left font-bold">📋 출제 방식 <span className="text-lime-400 text-[10px] ml-2 font-normal">※ 족(분류) 색상은 항상 표시</span></h3><div className="grid grid-cols-3 gap-2">{[{ id: 'name', icon: '🔤', name: '이름만', adv: true },{ id: 'symbol', icon: '⚛️', name: '기호만', adv: true },{ id: 'all', icon: '📖', name: '전체', adv: false }].map(h => (<button key={h.id} onClick={() => setTaHint(h.id)} className={`p-2 rounded-xl border-2 transition-all flex flex-col items-center ${taHint === h.id ? 'border-fuchsia-500 bg-fuchsia-950/40 text-fuchsia-300' : 'border-slate-800 bg-slate-900/50 text-slate-500 hover:border-slate-700'}`}><span className="text-xl mb-1">{h.icon}</span><span className="font-bold text-xs text-slate-200">{h.name}</span>{h.adv && <span className="mt-1 bg-green-900/60 text-green-400 border border-green-500/30 rounded-full px-2 py-0.5 text-[9px]">-3초 어드밴티지</span>}</button>))}</div></div>
                                <button onClick={startTaGame} className="w-full py-4 rounded-xl font-black text-lg bg-gradient-to-r from-cyan-500 to-fuchsia-600 text-white shadow-[0_0_20px_rgba(192,38,211,0.3)] hover:opacity-90 active:scale-95 transition-all">▶ 타임어택 시작</button>
                                <button onClick={() => { window.history.pushState({modal:'ranking'},''); fetchRankings(); }} className="w-full mt-3 py-3 rounded-xl border border-slate-700 text-slate-300 text-sm font-bold hover:bg-slate-800 active:scale-95 transition-all flex justify-center items-center gap-2">🏆 명예의 전당 보기</button>
                            </div>
                        )}

                        {taView === 'playing' && (
                            <div className="w-full flex flex-col items-center max-w-6xl mx-auto animate-fade-in">
                                <div className="w-full flex flex-wrap justify-between items-center gap-3 mb-4">
                                    <div className="flex gap-2 flex-wrap">
                                        <div className={`px-4 py-1.5 rounded-full border border-slate-700 font-mono font-bold text-lg ${taTimer > 120 ? 'text-red-400 animate-pulse' : (taTimer < 0 ? 'text-lime-400' : 'text-cyan-400')} bg-slate-900`}>⏱ {taTimer.toFixed(2)}초</div>
                                        <div className="px-4 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-sm font-bold flex items-center gap-2"><span className="text-emerald-400">O {taCorrect}/{totalCount}</span><span className="text-slate-600">|</span><span className="text-red-400">X {taWrong}</span></div>
                                        {taHint !== 'all' && <div className="px-3 py-1.5 rounded-full border border-lime-500/50 bg-lime-950/40 text-lime-400 text-xs font-bold flex items-center">⚡ -3초 어드밴티지</div>}
                                        <button onClick={giveUpTaGame} className="px-3 py-1.5 rounded-full border border-red-500/50 bg-red-950/40 text-red-400 text-xs font-bold hover:bg-red-900/60 active:scale-95 transition-all flex items-center gap-1">🏳️ 포기하기</button>
                                    </div>
                                    <div className="px-3 py-1 rounded-full border border-slate-800 bg-slate-900 text-xs text-slate-400">{taDiff} 모드</div>
                                </div>
                                <div className="w-full h-2 bg-slate-900 rounded-full mb-4 overflow-hidden"><div className="h-full bg-gradient-to-r from-cyan-400 to-fuchsia-500 transition-all duration-300" style={{ width: `${(taCorrect / totalCount) * 100}%` }}></div></div>
                                <div className="w-full max-w-2xl bg-gradient-to-br from-slate-900 to-slate-950 border border-cyan-500/30 rounded-2xl p-6 text-center mb-6 shadow-lg relative overflow-hidden"><div className="text-xs text-slate-500 mb-2">이 원소의 위치를 아래 주기율표에서 찾아 탭하세요!</div><div className="text-4xl font-black text-white mb-2">{taHint === 'name' ? taCurrent?.name : taHint === 'symbol' ? taCurrent?.sym : `${taCurrent?.name} (${taCurrent?.sym})`}</div><div className="text-sm font-bold text-cyan-400">{taCurrent?.category?.label || '분류 알 수 없음'}</div>{taWrongStreak > 0 && <div className="absolute top-2 right-4 text-xs text-red-400 animate-pulse font-bold">연속 오답: {taWrongStreak}</div>}</div>
                                <div className="hidden portrait:flex md:hidden w-full max-w-2xl bg-amber-900/60 text-amber-300 text-xs p-2.5 rounded-xl items-center justify-center mb-3 border border-amber-500/40 animate-pulse shadow-md font-bold">📱 스마트폰을 가로로 눕히면 훨씬 터치하기 쉽습니다!</div>

                                <div className="w-full flex justify-center pb-4 select-none">
                                    <div className={`grid ${gridColsClass} gap-[1px] md:gap-[3px] mx-auto w-full max-w-5xl`} style={{ gridTemplateRows: 'repeat(9, minmax(0, 1fr))', aspectRatio: isCompact ? '8/9' : '18/9' }}>
                                        {GAME_ELEMENTS.map(el => {
                                            let isVisible = true;
                                            if (taDiff === '초급' && el.n > 20) isVisible = false;
                                            else if (taDiff === '중급' && el.period > 4) isVisible = false;
                                            else if (taDiff === '고급' && el.period > 5) isVisible = false;
                                            let targetCol = el.col;
                                            if (isCompact) {
                                                if (targetCol > 2 && targetCol < 13) isVisible = false;
                                                targetCol = targetCol <= 2 ? targetCol : targetCol - 10;
                                            }
                                            if (!isVisible) return null;
                                            const isFilled = taFilled.has(el.n);
                                            const isShake = taWrongFlash.id === el.n && Date.now() - taWrongFlash.trigger < 400;
                                            const isHintGlow = taHintFlash.id === el.n && Date.now() - taHintFlash.trigger < 1600;
                                            let cellClasses = `rounded-[2px] md:rounded-md border flex flex-col items-center justify-center relative overflow-hidden transition-all duration-150 w-full h-full `;
                                            if (isFilled) cellClasses += ` ${el.category.id} border-opacity-100 opacity-100 scale-100 z-10`;
                                            else cellClasses += ` bg-slate-800 border-slate-600 hover:border-cyan-400 hover:bg-slate-700 cursor-pointer active:scale-95 shadow-[inset_0_0_10px_rgba(255,255,255,0.02)]`;
                                            if (isShake) cellClasses += ` bg-red-950 border-red-500 shake-animation z-20`;
                                            if (isHintGlow) cellClasses += ` hint-flash-animation`;
                                            if (taIsLocked && !isFilled) cellClasses += ` opacity-60 pointer-events-none`;
                                            return (
                                                <div key={el.n} style={{ gridColumn: targetCol, gridRow: el.row }} className={cellClasses} onClick={() => handleTaCellClick(el.n)}>
                                                    {isFilled ? <><span className="text-[clamp(6px,1.5vw,9px)] text-slate-300 absolute top-[1px] md:top-0.5 left-[2px] md:left-1 leading-none">{el.n}</span><span className="font-bold text-[clamp(10px,2.5vw,14px)] md:text-sm text-white leading-tight md:mt-1">{el.sym}</span><span className="hidden md:block text-[8px] text-slate-200 leading-none mb-0.5 whitespace-nowrap">{el.name}</span></> : <><span className="absolute inset-0 flex items-center justify-center text-slate-500/40 text-[clamp(12px,3vw,24px)] md:text-2xl font-black pointer-events-none z-0">{el.n}</span><div className={`absolute bottom-0 w-full h-0.5 md:h-1 opacity-60 ${el.category.id.replace('cat-', 'bg-')}`}></div></>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {taView === 'result' && (
                            <div className="max-w-md mx-auto w-full glass-panel rounded-3xl p-8 text-center animate-fade-in relative z-10">
                                <h2 className="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-2">🎉 완주 성공!</h2><div className="text-5xl font-black text-white mb-2 flex justify-center items-end gap-1">{Math.max(0, taTimer).toFixed(2)}<span className="text-xl text-cyan-400 mb-1">초</span></div>{taHint !== 'all' && <div className="text-xs text-lime-400 font-bold mb-4">⚡ {taHint === 'name' ? '이름만' : '기호만'} 모드 (-3초 반영)</div>}
                                <div className="flex flex-col gap-1 text-sm text-slate-400 mb-6 bg-slate-900/50 p-4 rounded-xl border border-slate-800"><div>{totalCount}개 완료 · {taDiff} 모드</div><div className={taWrong > 0 ? "text-red-400" : "text-lime-400"}>{taWrong > 0 ? `오답 ${taWrong}회 발생` : '오답 없이 완벽!'}</div></div>
                                <div className="bg-slate-950/80 border border-slate-800 rounded-xl p-5 mb-6 text-left"><div className="text-xs text-slate-500 mb-3 text-center font-bold">🏆 명예의 전당 기록 남기기</div><div className="flex flex-col gap-2"><div className="flex items-center gap-2"><span className="text-xs text-slate-400 w-10">소속</span><input type="text" value="나주중학교" disabled className="bg-slate-900 border border-slate-700 text-slate-500 px-3 py-2 rounded-lg text-sm flex-grow opacity-70 cursor-not-allowed"/></div><div className="flex items-center gap-2"><span className="text-xs text-slate-400 w-10">이름</span><input type="text" value={taSubmitName} onChange={(e) => setTaSubmitName(e.target.value)} placeholder="학생 실명 입력" maxLength={12} className="bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg text-sm flex-grow focus:outline-none focus:border-cyan-500 transition-colors" disabled={taSubmitStatus === '완료' || taSubmitStatus === '로딩중'}/></div></div>{taSubmitStatus === '' && <button onClick={submitTaRanking} className="w-full mt-4 py-2.5 rounded-lg bg-cyan-900/40 border border-cyan-500/50 text-cyan-400 font-bold text-sm hover:bg-cyan-900/60 transition-colors">통합 DB에 랭킹 제출하기</button>}{taSubmitStatus === '로딩중' && <div className="mt-4 text-center text-xs text-slate-400 py-2.5">업로드 중...</div>}{taSubmitStatus === '완료' && <div className="mt-4 text-center text-sm font-bold text-lime-400 py-2.5">✅ 랭킹에 무사히 등재되었습니다!</div>}{taSubmitStatus === '에러' && <div className="mt-4 text-center text-xs text-red-400 py-2.5">서버 통신 실패. 제출되지 않았습니다.</div>}</div>
                                <div className="flex gap-3 mb-3"><button onClick={() => setTaView('intro')} className="flex-1 py-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 font-bold hover:bg-slate-700 transition-colors text-sm">처음으로</button><button onClick={startTaGame} className="flex-1 py-3 rounded-xl bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white font-bold hover:opacity-90 transition-opacity text-sm">🔄 다시 시작</button></div><button onClick={() => { window.history.pushState({modal:'ranking'},''); fetchRankings(); }} className="w-full py-3 rounded-xl bg-slate-900 border border-slate-700 text-cyan-400 text-sm font-bold hover:bg-slate-800 active:scale-95 transition-all">🏆 명예의 전당 보기</button>
                            </div>
                        )}
                    </main>
                );
            };

            return (
                <div className="flex-grow flex flex-col justify-between text-slate-100">
                    <header className="glass-panel border-b border-brand-500/20 px-6 py-4 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-40">
                        <div className="flex items-center gap-3"><span className="text-2xl animate-spin" style={{ animationDuration: '6s' }}>⚛️</span><div className="hidden sm:block"><h1 className="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-300 to-sky-100">통합 과학 웹앱</h1><p className="text-[10px] text-brand-300/80">원자 구조 탐구 & 주기율표 게임</p></div></div>
                        <div className="flex w-full min-w-max min-[480px]:w-auto bg-slate-900/80 p-1 rounded-xl border border-slate-800"><button onClick={() => { setMainMode('lab'); window.history.pushState({mode:'lab'},''); }} className={`flex-1 min-[480px]:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all ${mainMode === 'lab' ? 'bg-brand-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>🧪 실험실</button><button onClick={() => { setMainMode('game'); window.history.pushState({mode:'game'},''); }} className={`flex-1 min-[480px]:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1 ${mainMode === 'game' ? 'bg-fuchsia-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>⏱️ 타임어택</button></div>
                        <div className="flex items-center gap-3"><button onClick={() => { window.history.pushState({modal:'guide'},''); setShowGuide(true); }} className="text-xs bg-slate-900/80 border border-brand-500/30 hover:border-brand-400 text-brand-300 px-3 py-1.5 rounded-lg active:scale-95 transition-all items-center gap-1.5 flex shrink-0">⚙️ 가이드</button></div>
                    </header>

                    {mainMode === 'lab' ? renderLab() : renderTimeAttack()}

                    {showRankings && (
                        <div className="fixed inset-0 z-[150] bg-black/80 backdrop-blur-md flex items-center justify-center p-4"><div className="glass-panel w-full max-w-sm rounded-2xl shadow-2xl border border-cyan-500/30 flex flex-col max-h-[85vh] overflow-hidden"><div className="px-5 py-4 border-b border-slate-800 flex items-center justify-between bg-slate-950/80"><h3 className="text-lg font-black text-cyan-400">🏆 명예의 전당</h3><button onClick={() => setShowRankings(false)} className="text-slate-400 hover:text-white text-xl font-bold">✕</button></div><div className="p-5 overflow-y-auto flex-grow flex flex-col gap-3">{rankingsLoading ? <div className="py-10 flex flex-col items-center justify-center text-slate-400"><div className="w-8 h-8 rounded-full border-2 border-cyan-500/30 border-t-cyan-400 animate-spin mb-3"></div>구글 DB에서 랭킹을 불러오는 중...</div> : rankingsData.length === 0 ? <div className="py-10 text-center text-slate-400 text-sm">아직 등록된 타임어택 기록이 없습니다.</div> : rankingsData.map((rank, idx) => <div key={idx} className="bg-slate-900/60 border border-slate-800 rounded-xl p-3 flex items-center justify-between"><div className="flex items-center gap-3"><div className={`w-6 text-center font-black ${idx === 0 ? 'text-yellow-400 text-lg' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-amber-600' : 'text-slate-500'}`}>{idx + 1}</div><div className="flex flex-col"><span className="font-bold text-sm text-white">{rank.name}</span><span className="text-[10px] text-slate-400">{rank.diff} 모드 / {rank.hint === 'all' ? '전체' : rank.hint === 'name' ? '이름' : '기호'}</span></div></div><div className="text-right text-cyan-400 font-mono font-bold">{Number(rank.time).toFixed(2)}초</div></div>)}</div><div className="p-4 bg-slate-950/80 border-t border-slate-800"><button onClick={() => setShowRankings(false)} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">닫기</button></div></div></div>
                    )}

                    {showGuide && (
                        <div className="fixed inset-0 z-[250] bg-black/75 backdrop-blur-sm flex items-center justify-center p-4"><div className="glass-panel w-full max-w-2xl rounded-2xl shadow-2xl border border-brand-500/30 flex flex-col max-h-[90vh] overflow-hidden"><div className="px-6 py-4 border-b border-slate-800 flex items-center justify-between bg-slate-950/80"><h3 className="text-base font-bold text-brand-300 flex items-center gap-2"><span>⚙️</span> 교사용 구글 DB 통합 연동 가이드</h3><button onClick={() => setShowGuide(false)} className="text-slate-400 hover:text-slate-100 text-xl font-bold w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-900">✕</button></div><div className="p-6 overflow-y-auto text-xs leading-relaxed text-slate-300 flex flex-col gap-5"><div><p className="mb-2 text-sm text-slate-100 font-semibold">1단계. 열 헤더 설정 (9개 열)</p><div className="bg-slate-950 border border-slate-800 p-2.5 rounded-lg font-mono text-center text-brand-300 overflow-x-auto whitespace-nowrap">제출 시간 | 활동 구분 | 학번 | 이름 | 난이도(탐색수) | 힌트(자극수) | 기록(최대전자) | 퀴즈 결과 | 탐구 소감</div></div><div><p className="mb-2 text-sm text-slate-100 font-semibold">2단계. Apps Script 소스 입력</p><div className="relative"><pre className="bg-slate-950 p-4 rounded-lg overflow-x-auto font-mono text-[11px] text-emerald-400 border border-slate-800 max-h-48 whitespace-pre-wrap break-all">{APP_SCRIPT_CODE}</pre><button onClick={handleCopyCode} className="absolute top-2 right-2 bg-brand-600 hover:bg-brand-500 text-white font-bold px-3 py-1.5 rounded-lg shadow-md text-xs transition-colors">{copied ? "✅ 복사 완료!" : "📄 전체 코드 복사"}</button></div></div><div className="bg-brand-500/10 border border-brand-500/30 p-3 rounded-xl text-[11px] text-brand-200"><p className="font-bold mb-1">🔗 연동 방법 (필수):</p>[웹 앱] 배포를 통해 얻은 긴 URL 주소를 본 HTML 파일의 <span className="font-mono font-bold bg-slate-900 px-1 py-0.5 rounded text-fuchsia-400">const GOOGLE_SCRIPT_URL</span> 에 기입하시면 보고서 및 명예의 전당 기능이 활성화됩니다.</div></div></div></div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 z-[300] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4"><div className="bg-slate-900 border border-brand-500/30 w-full max-w-sm rounded-xl overflow-hidden shadow-2xl"><div className="p-4 bg-slate-950 border-b border-slate-800"><h4 className="font-bold text-sm text-brand-300">{customAlert.title}</h4></div><div className="p-4"><p className="text-xs text-slate-300 leading-relaxed">{customAlert.message}</p></div><div className="p-3 bg-slate-950 flex justify-end"><button onClick={closeCustomAlert} className="bg-brand-600 hover:bg-brand-500 text-white font-bold text-xs px-4 py-2 rounded-lg active:scale-95 transition-all">확인</button></div></div></div>
                    )}

                    {isLoading && (
                        <div className="fixed inset-0 z-[200] bg-black/80 flex flex-col items-center justify-center gap-3"><div className="w-12 h-12 rounded-full border-4 border-brand-500/30 border-t-brand-400 animate-spin"></div><p className="text-sm font-bold text-brand-300">구글 시트로 학생 기록 업로드 처리 중...</p></div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
