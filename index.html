        /* Lab Animations */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .animate-pulse-slow { animation: pulse-slow 4s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 6s infinite ease-in-out; }

        /* Time Attack Game Animations */
        @keyframes shakeCell {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-3deg); }
            75% { transform: translateX(6px) rotate(3deg); }
        }
        .shake-animation { animation: shakeCell 0.35s ease; }
        
        @keyframes hintFlash {
            0%, 100% { box-shadow: none; border-color: rgba(56, 189, 248, 0.1); }
            50% { box-shadow: 0 0 20px #fde047; border-color: #fde047; background-color: rgba(253, 224, 71, 0.2); }
        }
        .hint-flash-animation { animation: hintFlash 0.8s ease 2; z-index: 10; }

        const playTone = (freqs, type, dur) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!window._audioCtx) window._audioCtx = new AudioContext();
                const ctx = window._audioCtx;
                if (ctx.state === 'suspended') ctx.resume();

                freqs.forEach((f, i) => {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.type = type || 'sine';
                    o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
                    g.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + dur);
                    o.start(ctx.currentTime + i * 0.12);
                    o.stop(ctx.currentTime + i * 0.12 + dur);
                });
            } catch(e) {}
        };

        // --- 원자 시뮬레이터 코어 (Pure Canvas Engine) ---
        class AtomVisualizer {
            constructor(canvas, elementData, highlightOuter = true) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.element = elementData;
                this.highlightOuter = highlightOuter; 
                this.electrons = [];
                this.photons = [];
                this.nucleusPulse = 0;
                this.running = true;
                this.electronSpeedMultiplier = 1.0;
                this.initElectrons();
            }

            initElectrons() {
                this.electrons = [];
                const shells = this.element.shells;
                const totalShells = shells.length;

                shells.forEach((count, sIdx) => {
                    const radius = 65 + sIdx * 35;
                    const speed = 0.05 / (sIdx + 1);
                    const isOuterShell = (sIdx === totalShells - 1);

                    for (let i = 0; i < count; i++) {
                        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
                        this.electrons.push({
                            shellIndex: sIdx, radius: radius, angle: angle,
                            speed: speed, baseSpeed: speed, isOuter: isOuterShell
                        });
                    }
                });
            }

            emitPhoton(color) {
                for (let i = 0; i < 3; i++) {
                    this.photons.push({
                        x: this.canvas.width / 2, y: this.canvas.height / 2,
                        radius: 10, opacity: 1, speed: 2 + i * 1.5, color: color
                    });
                }
            }

            draw() {
                if (!this.running) return;
                const ctx = this.ctx;
                const canvas = this.canvas;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                ctx.fillStyle = 'rgba(2, 6, 23, 0.25)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = 'rgba(14, 165, 233, 0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(cx, cy, 180, 0, Math.PI * 2);
                ctx.stroke();

                const sCount = this.element.shells.length;
                for (let i = 0; i < sCount; i++) {
                    const r = 65 + i * 35;
                    const isOuterShell = (i === sCount - 1);
                    
                    if (isOuterShell && this.highlightOuter) {
                        ctx.strokeStyle = 'rgba(245, 158, 11, 0.45)';
                        ctx.lineWidth = 2;
                    } else {
                        ctx.strokeStyle = 'rgba(56, 189, 248, 0.25)';
                        ctx.lineWidth = 1.2;
                    }
                    
                    ctx.setLineDash([4, 6]);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = isOuterShell && this.highlightOuter ? 'rgba(245, 158, 11, 0.8)' : 'rgba(56, 189, 248, 0.4)';
                    ctx.font = 'bold 9px sans-serif';
                    ctx.fillText(`${['K', 'L', 'M', 'N'][i] || i+1}껍질${isOuterShell && this.highlightOuter ? ' (바깥)' : ''}`, cx + r - 20, cy - 6);
                }

                this.photons.forEach((p, idx) => {
                    p.radius += p.speed;
                    p.opacity -= 0.015;
                    if (p.opacity <= 0) {
                        this.photons.splice(idx, 1);
                        return;
                    }

                    ctx.strokeStyle = p.color;
                    ctx.globalAlpha = p.opacity;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    for (let a = 0; a < Math.PI * 2; a += 0.1) {
                        const waveR = p.radius + Math.sin(a * 16) * 5;
                        const wx = cx + Math.cos(a) * waveR;
                        const wy = cy + Math.sin(a) * waveR;
                        if (a === 0) ctx.moveTo(wx, wy);
                        else ctx.lineTo(wx, wy);
                    }
                    ctx.closePath();
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                });

                this.nucleusPulse += 0.03;
                const nRadius = 25 + Math.sin(this.nucleusPulse) * 1.5;
                
                const grad = ctx.createRadialGradient(cx, cy, 5, cx, cy, nRadius + 15);
                grad.addColorStop(0, 'rgba(239, 68, 68, 0.45)');
                grad.addColorStop(0.5, 'rgba(59, 130, 246, 0.3)');
                grad.addColorStop(1, 'rgba(2, 6, 23, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, nRadius + 20, 0, Math.PI * 2);
                ctx.fill();

                const clusterCount = Math.min(this.element.protons, 12);
                for (let i = 0; i < clusterCount; i++) {
                    const angle = (i / clusterCount) * Math.PI * 2 + this.nucleusPulse * 0.1;
                    const offset = 8 + (i % 2 === 0 ? 3 : 0);
                    const px = cx + Math.cos(angle) * offset;
                    const py = cy + Math.sin(angle) * offset;

                    const isProton = i % 2 === 0;
                    const pGrad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, 6);
                    if (isProton) {
                        pGrad.addColorStop(0, '#fca5a5');
                        pGrad.addColorStop(1, '#ef4444');
                    } else {
                        pGrad.addColorStop(0, '#93c5fd');
                        pGrad.addColorStop(1, '#2563eb');
                    }
                    ctx.fillStyle = pGrad;
                    ctx.beginPath();
                    ctx.arc(px, py, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 8px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(isProton ? '+' : 'n', px, py);
                }

                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.shadowColor = '#000000';
                ctx.shadowBlur = 4;
                ctx.font = 'bold 12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${this.element.symbol}`, cx, cy - 1);
                ctx.shadowBlur = 0;

                this.electrons.forEach((e) => {
                    e.angle += e.speed * this.electronSpeedMultiplier;
                    const ex = cx + Math.cos(e.angle) * e.radius;
                    const ey = cy + Math.sin(e.angle) * e.radius;

                    const useHighlight = e.isOuter && this.highlightOuter;
                    ctx.shadowColor = useHighlight ? '#f59e0b' : '#38bdf8';
                    ctx.shadowBlur = 8;
                    
                    const eGrad = ctx.createRadialGradient(ex - 1.5, ey - 1.5, 0.5, ex, ey, 5.5);
                    if (useHighlight) {
                        eGrad.addColorStop(0, '#fef3c7');
                        eGrad.addColorStop(0.4, '#f59e0b');
                        eGrad.addColorStop(1, '#d97706');
                    } else {
                        eGrad.addColorStop(0, '#e0f2fe');
                        eGrad.addColorStop(0.4, '#38bdf8');
                        eGrad.addColorStop(1, '#0284c7');
                    }
                    
                    ctx.fillStyle = eGrad;
                    ctx.beginPath();
                    ctx.arc(ex, ey, 5.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = '#020617';
                    ctx.font = 'bold 9px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('-', ex, ey - 0.5);
                });
            }
        }

                }
                if (!GOOGLE_SCRIPT_URL) {
                    triggerCustomAlert("⚙️ 데이터베이스 연동 미완성", "우측 상단 '⚙️ DB 연동 가이드'를 클릭하여 통합 구글 스프레드시트 주소를 연결하면 데이터가 축적됩니다.");
                    return;
                }

                setIsLoading(true);
                let correctCount = 0;
                randomQuizzes.forEach(quiz => { if (userAnswers[quiz.id] === quiz.a) correctCount++; });

                const payload = {
                    type: 'lab', // 실험실 기록 구분자
                    timestamp: new Date().toLocaleString(),
                    studentId, studentName,
                    visitedCount: stats.visitedElements.size,
                    excitationCount: stats.excitationCount,
                    maxOuterElectrons: stats.maxOuterElectrons,
                    quizScore: `${correctCount}/${randomQuizzes.length}`,
                    insight: insight
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    setIsLoading(false);
                    setView('done');
                } catch (e) {
                    setIsLoading(false);
                    triggerCustomAlert("❌ 오류 발생", "서버 전송 중 에러가 발생하였습니다. 인터넷 연결이나 배포 버전을 확인하세요.");
                }
            };

            // --- [타임어택] 게임 및 명예의 전당 로직 ---
            const startTaGame = () => {
                let pool = GAME_ELEMENTS;
                if (taDiff === '초급') pool = GAME_ELEMENTS.filter(e => e.n <= 20);
                else if (taDiff === '중급') pool = GAME_ELEMENTS.filter(e => e.period <= 4);
                else if (taDiff === '고급') pool = GAME_ELEMENTS.filter(e => e.period <= 5);

                const shuffled = [...pool].sort(() => 0.5 - Math.random());
                
                setTaQueue(shuffled);
                setTaCurrent(shuffled[0]);
                setTaFilled(new Set());
                setTaCorrect(0);
                setTaWrong(0);
                setTaWrongStreak(0);
                setTaIsLocked(false);
                setTaSubmitStatus('');
                setTaView('playing');
                
                const hasAdv = taHint !== 'all';
                taStartTime.current = Date.now() + (hasAdv ? 3000 : 0);
                
                const tick = () => {
                    setTaTimer((Date.now() - taStartTime.current) / 1000);
                    taAnimFrame.current = requestAnimationFrame(tick);
                };
                taAnimFrame.current = requestAnimationFrame(tick);
            };

            const endTaGame = useCallback(() => {
                cancelAnimationFrame(taAnimFrame.current);
                setTaTimer(Math.max(0, (Date.now() - taStartTime.current) / 1000));
                setTaView('result');
                playComplete();
            }, []);

            const handleTaCellClick = (n) => {
                if (taIsLocked || taView !== 'playing' || !taCurrent || taFilled.has(n)) return;

                if (n === taCurrent.n) {
                    playCorrect();
                    setTaFilled(prev => {
                        const next = new Set(prev);
                        next.add(n);
                        return next;
                    });
                    setTaCorrect(prev => prev + 1);
                    setTaWrongStreak(0);
                    
                    const nextQueue = taQueue.slice(1);
                    setTaQueue(nextQueue);
                    
                    if (nextQueue.length === 0) {
                        endTaGame();
                    } else {
                        setTaCurrent(nextQueue[0]);
                    }
                } else {
                    playWrong();
                    setTaWrong(prev => prev + 1);
                    const currentStreak = taWrongStreak + 1;
                    setTaWrongStreak(currentStreak);
                    
                    setTaWrongFlash({ id: n, trigger: Date.now() });
                    setTaIsLocked(true);
                    
                    if (currentStreak >= 3) {
                        setTaHintFlash({ id: taCurrent.n, trigger: Date.now() });
                    }
                    
                    setTimeout(() => setTaIsLocked(false), 1200);
                }
            };

            const submitTaRanking = async () => {
                if (!taSubmitName.trim()) {
                    triggerCustomAlert("❗ 정보 확인", "이름을 정확히 입력해주세요.");
                    return;
                }
                if (!GOOGLE_SCRIPT_URL) {
                    triggerCustomAlert("❗ 연결 불가", "교사 DB 스크립트가 등록되지 않았습니다.");
                    return;
                }

                setTaSubmitStatus('로딩중');
                const payload = {
                    type: 'game', // 게임 랭킹 기록 구분자
                    timestamp: new Date().toLocaleString(),
                    playerName: taSubmitName,
                    difficulty: taDiff,
                    hintMode: taHint,
                    elapsedTime: taTimer.toFixed(2)
                };

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    setTaSubmitStatus('완료');
                } catch(e) {
                    setTaSubmitStatus('에러');
                }
            };

            const fetchRankings = async () => {
                if (!GOOGLE_SCRIPT_URL) {
                    triggerCustomAlert("❗ 연결 불가", "DB 주소가 설정되지 않아 명예의 전당을 불러올 수 없습니다. 교사 가이드를 확인하세요.");
                    return;
                }
                setRankingsLoading(true);
                setShowRankings(true);
                try {
                    // Apps Script doGet 함수 호출 (CORS를 자동 지원함)
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getRankings`);
                    const data = await res.json();
                    setRankingsData(data || []);
                } catch (e) {
                    console.error("랭킹 호출 오류:", e);
                    setRankingsData([]);
                } finally {
                    setRankingsLoading(false);
                }
            };

            const getCategoryColor = (category) => {
                switch(category) {
                    case 'nonmetal': return 'bg-purple-950 border-purple-500 hover:bg-purple-900/50';
                    case 'noble': return 'bg-teal-950 border-teal-500 hover:bg-teal-900/50';
                    case 'alkali': return 'bg-red-950 border-red-500 hover:bg-red-900/50';
                    case 'alkaline-earth': return 'bg-orange-950 border-orange-500 hover:bg-orange-900/50';
                    case 'metalloid': return 'bg-lime-950 border-lime-500 hover:bg-lime-900/50';
                    default: return 'bg-blue-950 border-blue-500 hover:bg-blue-900/50';
                }
            };

            // --- 렌더링 헬퍼 [실험실] ---
            const renderLab = () => (
                <main class="flex-grow flex flex-col p-4 md:p-6 max-w-7xl w-full mx-auto justify-center">
                    {view === 'intro' && (
                        <div class="max-w-3xl mx-auto w-full text-center py-8 px-4 flex flex-col items-center">
                            <div class="relative w-48 h-48 mb-8 animate-float">
                                <div class="absolute inset-0 rounded-full border border-brand-500/30 animate-pulse-slow"></div>
                                <div class="absolute inset-4 rounded-full border border-purple-500/20 animate-pulse"></div>
                                <div class="absolute inset-8 rounded-full border border-emerald-500/20 animate-ping" style={{ animationDuration: '3s' }}></div>
                                <div class="absolute inset-0 flex items-center justify-center text-6xl">🔬</div>
                            </div>
                            <h2 class="text-3xl md:text-4xl font-extrabold mb-4 tracking-tight leading-tight">
                                원자의 규칙을 찾아서 <br/>
                                <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-cyan-300">원자 구조와 주기율표 탐구</span>
                            </h2>
                            <p class="text-slate-400 text-sm md:text-base max-w-xl mb-8 leading-relaxed">
                                원자핵의 양성자 수와 전자 껍질의 규칙성을 확인해보세요.
                                원자번호에 따른 '가장 바깥 전자 수'의 주기성을 직관적으로 관찰할 수 있습니다.
                            </p>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full mb-8 text-left">
                                <div class="p-4 rounded-xl border border-brand-500/10 bg-slate-900/50">
                                    <div class="text-xl mb-1">🌟 <b>실시간 원자 모형</b></div>
                                    <p class="text-xs text-slate-400">보어 모형 기반 1~20번 원소 전자 배치 시각화</p>
                                </div>
                                <div class="p-4 rounded-xl border border-brand-500/10 bg-slate-900/50">
                                    <div class="text-xl mb-1">🔍 <b>주기적 규칙 발견</b></div>
                                    <p class="text-xs text-slate-400">족과 주기에 따른 원자가 전자의 변화 탐구</p>
                                </div>
                                <div class="p-4 rounded-xl border border-brand-500/10 bg-slate-900/50">
                                    <div class="text-xl mb-1">📝 <b>탐구 보고서 제출</b></div>
                                    <p class="text-xs text-slate-400">퀴즈를 풀고 알게 된 점을 구글 시트에 기록</p>
                                </div>
                            </div>

                            <button onClick={() => setView('simulation')} class="bg-gradient-to-r from-brand-600 to-cyan-500 hover:from-brand-500 hover:to-cyan-400 text-white font-bold text-lg px-8 py-4 rounded-xl shadow-[0_0_20px_rgba(14,165,233,0.3)] active:scale-95 transition-all w-full sm:w-auto">
                                🚀 실험 가상 연구소 입장하기
                            </button>
                        </div>
                    )}

                    {view === 'simulation' && (
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 w-full">
                            <div class="lg:col-span-7 flex flex-col gap-6">
                                <div class="glass-panel rounded-2xl p-4 md:p-5 flex flex-col gap-3">
                                    <div class="flex items-center justify-between">
                                        <h3 class="text-sm font-semibold text-brand-300">📊 주기율표 선택 패널 (H - Ca)</h3>
                                        <span class="text-[10px] text-slate-400">원소를 클릭하면 궤도 모형이 로딩됩니다.</span>
                                    </div>
                                    
                                    <div class="grid grid-cols-8 gap-1 text-center text-xs mt-2 w-full">
                                        {ELEMENT_DATA.map((el, i) => {
                                            const isSelected = el === selectedElement;
                                            // 수소(0) 뒤에 6칸 빈공간을 추가하여 헬륨이 8열(18족) 위치에 맞게 교정됨
                                            const needGap = (i === 0) ? 6 : 0;
                                            
                                            return (
                                                <React.Fragment key={el.no}>
                                                    <button onClick={() => selectElementAndLog(el)} class={`p-1.5 rounded-lg border flex flex-col items-center justify-center font-bold h-10 md:h-12 transition-all ${isSelected ? 'ring-2 ring-brand-400 scale-105 z-10' : ''} ${getCategoryColor(el.category)}`}>
                                                        <span class="text-[9px] text-slate-400">{el.no}</span>
                                                        <span class="text-sm">{el.symbol}</span>
                                                    </button>
                                                    {needGap > 0 && <div class={`col-span-${needGap}`}></div>}
                                                </React.Fragment>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div class="glass-panel rounded-2xl p-4 md:p-5 flex flex-col gap-3">
                                    <h4 class="font-bold text-sm text-brand-300">🔍 원소 백과사전 및 특징</h4>
                                    <div class="border-t border-slate-800 pt-3">
                                        <div class="flex items-baseline gap-2 mb-1.5">
                                            <span class="text-2xl font-black text-brand-400">{selectedElement.symbol}</span>
                                            <span class="text-sm font-semibold">{selectedElement.name} (번호 {selectedElement.no})</span>
                                        </div>
                                        <p class="text-xs text-slate-300 bg-slate-900/40 p-3 rounded-lg border border-slate-800">{selectedElement.desc}</p>
                                    </div>
                                    
                                    <div class="grid grid-cols-2 gap-3 mt-1.5 text-xs">
                                        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800">
                                            <div class="text-slate-400 mb-0.5">양성자 수 (핵전하량)</div>
                                            <div class="font-bold text-red-400">+{selectedElement.protons}</div>
                                        </div>
                                        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800">
                                            <div class="text-slate-400 mb-0.5">총 전자 수</div>
                                            <div class="font-bold text-brand-400">-{selectedElement.protons}</div>
                                        </div>
                                        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800">
                                            <div class="text-slate-400 mb-0.5">전자 껍질 (주기)</div>
                                            <div class="font-bold text-fuchsia-400">{selectedElement.period}주기</div>
                                        </div>
                                        <div class="bg-slate-900/60 p-2.5 rounded-lg border border-slate-800">
                                            <div class="text-slate-400 mb-0.5">가장 바깥 전자 (족)</div>
                                            <div class="font-bold text-amber-400">{selectedElement.group}족 ({selectedElement.shells[selectedElement.shells.length - 1]}개)</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="lg:col-span-5 flex flex-col gap-6">
                                <div class="glass-panel rounded-2xl p-4 flex flex-col relative overflow-hidden">
                                    <span class="text-xs bg-slate-900/80 px-2.5 py-1 rounded-full border border-brand-500/20 text-brand-300 font-medium w-max mb-3">⚛️ 보어 원자 궤도 모형</span>
                                    <div class="relative w-full aspect-square bg-slate-950 rounded-xl overflow-hidden border border-brand-500/10 shadow-[inner_0_0_20px_rgba(14,165,233,0.1)]">
                                        <canvas ref={canvasRef} class="w-full h-full block"></canvas>
                                    </div>
                                    <div class="mt-4 flex flex-col gap-4">
                                        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-800/80 flex items-center justify-between">
                                            <div class="flex flex-col gap-0.5">
                                                <span class="text-xs font-semibold text-amber-300">💡 원자가 전자 강조</span>
                                                <span class="text-[10px] text-slate-400">바깥 껍질 전자를 금색으로 밝힙니다.</span>
                                            </div>
                                            <button onClick={() => setHighlightOuter(!highlightOuter)} class={`px-3 py-1.5 rounded-lg text-xs font-bold active:scale-95 ${highlightOuter ? 'bg-amber-500 text-slate-950' : 'bg-slate-800 text-slate-400'}`}>
                                                {highlightOuter ? '켜짐' : '꺼짐'}
                                            </button>
                                        </div>
                                        <div class="flex items-center justify-between gap-4">
                                            <input type="range" min="0.2" max="2.5" step="0.1" value={speed} onChange={(e) => setSpeed(parseFloat(e.target.value))} class="w-full accent-brand-500 h-1 bg-slate-800 rounded-lg cursor-pointer"/>
                                            <button onClick={triggerExcitation} class="bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold text-xs px-4 py-3 rounded-lg shrink-0">✨ 에너지 자극</button>
                                        </div>
                                    </div>
                                </div>

                                <div class="glass-panel rounded-2xl p-4 flex flex-col gap-3">
                                    <button onClick={() => setView('report')} class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3.5 rounded-xl active:scale-95 shadow-[0_0_15px_rgba(16,185,129,0.2)]">📝 원자 구조 탐구 보고서 작성 ➔</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'report' && (
                        <div class="max-w-3xl mx-auto w-full flex flex-col gap-6">
                            <div class="glass-panel rounded-2xl p-5 md:p-6 flex flex-col gap-4">
                                <h3 class="font-bold text-sm text-brand-300 border-b border-slate-800 pb-2">👤 학생 인적 정보 입력 (나주중학교)</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="number" placeholder="학번 (예: 2201)" value={studentId} onChange={(e) => setStudentId(e.target.value)} class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2.5 text-sm" />
                                    <input type="text" placeholder="이름" value={studentName} onChange={(e) => setStudentName(e.target.value)} class="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2.5 text-sm" />
                                </div>
                            </div>

                            <div class="glass-panel rounded-2xl p-5 flex flex-col gap-4">
                                <h3 class="font-bold text-sm text-brand-300 border-b border-slate-800 pb-2">📝 OX 퀴즈</h3>
                                <div class="flex flex-col gap-4">
                                    {randomQuizzes.map((quiz, qIdx) => {
                                        const isAnswered = userAnswers[quiz.id] !== undefined;
                                        const isCorrect = userAnswers[quiz.id] === quiz.a;
                                        return (
                                            <div key={quiz.id} class="p-4 rounded-xl bg-slate-950 border border-slate-800">
                                                <p class="text-sm font-semibold mb-3">Q{qIdx + 1}. {quiz.q}</p>
                                                <div class="grid grid-cols-2 gap-3">
                                                    <button onClick={() => { setUserAnswers(p => ({...p, [quiz.id]: true})); setShowExplanation(p => ({...p, [quiz.id]: true})); }} disabled={isAnswered} class={`py-2 rounded-lg font-black transition-all ${userAnswers[quiz.id] === true ? (quiz.a ? 'bg-emerald-600/30 text-emerald-300 border border-emerald-500' : 'bg-red-600/30 text-red-300 border border-red-500') : 'bg-slate-900'} ${isAnswered && userAnswers[quiz.id] !== true ? 'opacity-40' : ''}`}>⭕ O</button>
                                                    <button onClick={() => { setUserAnswers(p => ({...p, [quiz.id]: false})); setShowExplanation(p => ({...p, [quiz.id]: true})); }} disabled={isAnswered} class={`py-2 rounded-lg font-black transition-all ${userAnswers[quiz.id] === false ? (!quiz.a ? 'bg-emerald-600/30 text-emerald-300 border border-emerald-500' : 'bg-red-600/30 text-red-300 border border-red-500') : 'bg-slate-900'} ${isAnswered && userAnswers[quiz.id] !== false ? 'opacity-40' : ''}`}>❌ X</button>
                                                </div>
                                                {showExplanation[quiz.id] && <div class={`mt-3 p-3 rounded-lg text-xs border ${isCorrect ? 'bg-emerald-950/40 border-emerald-500/20 text-emerald-300' : 'bg-red-950/40 border-red-500/20 text-red-300'}`}><b>{isCorrect ? '정답!' : '오답!'}</b> {quiz.explain}</div>}
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            <div class="glass-panel rounded-2xl p-5 flex flex-col gap-4">
                                <h3 class="font-bold text-sm text-brand-300 border-b border-slate-800 pb-2">📑 알게 된 점</h3>
                                <textarea rows="3" placeholder="주기율표의 가로줄(주기)과 세로줄(족)에 따른 전자 규칙성에 대해 배운 점을 쓰세요..." value={insight} onChange={(e) => setInsight(e.target.value)} class="bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm resize-none"></textarea>
                            </div>

                            <div class="flex gap-3">
                                <button onClick={() => setView('simulation')} class="bg-slate-900 border border-slate-800 py-3.5 px-6 rounded-xl w-auto shrink-0">◀ 돌아가기</button>
                                <button onClick={submitLabData} class="bg-brand-600 hover:bg-brand-500 text-white font-bold py-3.5 rounded-xl flex-grow">🚀 통합 보고서 제출하기</button>
                            </div>
                        </div>
                    )}

                    {view === 'done' && (
                        <div class="max-w-md mx-auto w-full text-center py-12 px-6 glass-panel rounded-2xl">
                            <span class="text-6xl animate-bounce block mb-4">🎓</span>
                            <h2 class="text-2xl font-bold mb-2">제출 완료!</h2>
                            <p class="text-slate-400 text-sm mb-6">보고서가 시트에 기록되었습니다.</p>
                            <button onClick={() => { setView('intro'); setUserAnswers({}); setShowExplanation({}); setInsight(''); }} class="bg-slate-900 border border-slate-800 py-3 px-6 rounded-xl w-full hover:bg-slate-800">🔄 다시 시작</button>
                        </div>
                    )}
                </main>
            );

            // --- 렌더링 헬퍼 [타임어택] ---
            const renderTimeAttack = () => {
                // 모바일 최적화를 위해 초급,중급 모드일 때 빈 열(전이금속)을 압축 (18열 -> 8열)
                const isCompact = taDiff === '초급' || taDiff === '중급';
                const gridColsClass = isCompact ? 'grid-cols-8' : 'grid-cols-18';
                const minWClass = isCompact ? 'min-w-[320px] md:min-w-[500px]' : 'min-w-[850px]';

                return (
                    <main class="flex-grow flex flex-col p-4 md:p-6 w-full mx-auto justify-center max-w-6xl">
                        {taView === 'intro' && (
                            <div class="max-w-md mx-auto w-full text-center">
                                <div class="mb-8">
                                    <h1 class="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-2">⚗️ 주기율표<br/>타임어택</h1>
                                    <p class="text-slate-400 text-sm">빈 주기율표에서 원소의 위치를 빠르게 찾아라!</p>
                                </div>

                                <div class="glass-panel rounded-2xl p-5 mb-5">
                                    <h3 class="text-sm text-slate-400 mb-3 text-left font-bold">🎯 난이도 선택</h3>
                                    <div class="grid grid-cols-2 gap-2">
                                        {[
                                            { id: '초급', icon: '🟢', desc: '1~20번' },
                                            { id: '중급', icon: '🟡', desc: '1~4주기' },
                                            { id: '고급', icon: '🔴', desc: '1~5주기' },
                                            { id: '극악', icon: '💀', desc: '전체 118개' }
                                        ].map(d => (
                                            <button key={d.id} onClick={() => setTaDiff(d.id)} class={`p-3 rounded-xl border-2 transition-all flex flex-col items-center ${taDiff === d.id ? 'border-cyan-400 bg-cyan-950/40 text-cyan-400' : 'border-slate-800 bg-slate-900/50 text-slate-500 hover:border-slate-700'}`}>
                                                <span class="text-2xl mb-1">{d.icon}</span>
                                                <span class="font-bold text-sm text-slate-200">{d.id}</span>
                                                <span class="text-[10px] opacity-70">{d.desc}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div class="glass-panel rounded-2xl p-5 mb-6">
                                    <h3 class="text-sm text-slate-400 mb-3 text-left font-bold">📋 출제 방식 <span class="text-lime-400 text-[10px] ml-2 font-normal">※ 족(분류) 색상은 항상 표시</span></h3>
                                    <div class="grid grid-cols-3 gap-2">
                                        {[
                                            { id: 'name', icon: '🔤', name: '이름만', adv: true },
                                            { id: 'symbol', icon: '⚛️', name: '기호만', adv: true },
                                            { id: 'all', icon: '📖', name: '전체', adv: false }
                                        ].map(h => (
                                            <button key={h.id} onClick={() => setTaHint(h.id)} class={`p-2 rounded-xl border-2 transition-all flex flex-col items-center ${taHint === h.id ? 'border-fuchsia-500 bg-fuchsia-950/40 text-fuchsia-300' : 'border-slate-800 bg-slate-900/50 text-slate-500 hover:border-slate-700'}`}>
                                                <span class="text-xl mb-1">{h.icon}</span>
                                                <span class="font-bold text-xs text-slate-200">{h.name}</span>
                                                {h.adv && <span class="mt-1 bg-green-900/60 text-green-400 border border-green-500/30 rounded-full px-2 py-0.5 text-[9px]">-3초 어드밴티지</span>}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={startTaGame} class="w-full py-4 rounded-xl font-black text-lg bg-gradient-to-r from-cyan-500 to-fuchsia-600 text-white shadow-[0_0_20px_rgba(192,38,211,0.3)] hover:opacity-90 active:scale-95 transition-all">
                                    ▶ 타임어택 시작
                                </button>
                                <button onClick={fetchRankings} class="w-full mt-3 py-3 rounded-xl border border-slate-700 text-slate-300 text-sm font-bold hover:bg-slate-800 active:scale-95 transition-all flex justify-center items-center gap-2">
                                    🏆 명예의 전당 보기
                                </button>
                            </div>
                        )}

                        {taView === 'playing' && (
                            <div class="w-full flex flex-col items-center max-w-6xl mx-auto animate-fade-in">
                                <div class="w-full flex flex-wrap justify-between items-center gap-3 mb-4">
                                    <div class="flex gap-2 flex-wrap">
                                        <div class={`px-4 py-1.5 rounded-full border border-slate-700 font-mono font-bold text-lg ${taTimer > 120 ? 'text-red-400 animate-pulse' : (taTimer < 0 ? 'text-lime-400' : 'text-cyan-400')} bg-slate-900`}>
                                            ⏱ {taTimer.toFixed(2)}초
                                        </div>
                                        <div class="px-4 py-1.5 rounded-full border border-slate-700 bg-slate-900 text-sm font-bold flex items-center gap-2">
                                            <span class="text-emerald-400">O {taCorrect}/{taQueue.length + taCorrect}</span>
                                            <span class="text-slate-600">|</span>
                                            <span class="text-red-400">X {taWrong}</span>
                                        </div>
                                        {taHint !== 'all' && <div class="px-3 py-1.5 rounded-full border border-lime-500/50 bg-lime-950/40 text-lime-400 text-xs font-bold flex items-center">⚡ -3초 어드밴티지</div>}
                                        <button onClick={giveUpTaGame} class="px-3 py-1.5 rounded-full border border-red-500/50 bg-red-950/40 text-red-400 text-xs font-bold hover:bg-red-900/60 active:scale-95 transition-all flex items-center gap-1">
                                            🏳️ 포기하기
                                        </button>
                                    </div>
                                    <div class="px-3 py-1 rounded-full border border-slate-800 bg-slate-900 text-xs text-slate-400">
                                        {taDiff} 모드
                                    </div>
                                </div>

                                <div class="w-full h-2 bg-slate-900 rounded-full mb-4 overflow-hidden">
                                    <div class="h-full bg-gradient-to-r from-cyan-400 to-fuchsia-500 transition-all duration-300" style={{ width: `${(taCorrect / (taQueue.length + taCorrect)) * 100}%` }}></div>
                                </div>

                                <div class="w-full max-w-2xl bg-gradient-to-br from-slate-900 to-slate-950 border border-cyan-500/30 rounded-2xl p-6 text-center mb-6 shadow-lg relative overflow-hidden">
                                    <div class="text-xs text-slate-500 mb-2">이 원소의 위치를 아래 주기율표에서 찾아 탭하세요!</div>
                                    <div class="text-4xl font-black text-white mb-2">
                                        {taHint === 'name' ? taCurrent?.name : taHint === 'symbol' ? taCurrent?.sym : `${taCurrent?.name} (${taCurrent?.sym})`}
                                    </div>
                                    <div class="text-sm font-bold text-cyan-400">{taCurrent?.category?.label || '분류 알 수 없음'}</div>
                                    {taWrongStreak > 0 && <div class="absolute top-2 right-4 text-xs text-red-400 animate-pulse font-bold">연속 오답: {taWrongStreak}</div>}
                                </div>

                                {/* 반응형 타임어택 주기율표 그리드 */}
                                <div class="w-full overflow-x-auto pb-4 custom-scrollbar flex justify-center">
                                    <div class={`grid ${gridColsClass} gap-[3px] mx-auto select-none ${minWClass}`} style={{ gridTemplateRows: 'repeat(9, minmax(42px, 1fr))' }}>
                                        {GAME_ELEMENTS.map(el => {
                                            // 렌더링 범위 제한 로직 (초급, 중급, 고급 난이도에 따른 필터링)
                                            let isVisible = true;
                                            if (taDiff === '초급' && el.n > 20) isVisible = false;
                                            else if (taDiff === '중급' && el.period > 4) isVisible = false;
                                            else if (taDiff === '고급' && el.period > 5) isVisible = false;

                                            // 모바일 최적화 (8칸 렌더링)시 컬럼 매핑
                                            let targetCol = el.col;
                                            if (isCompact) {
                                                if (targetCol > 2 && targetCol < 13) isVisible = false; // 전이 금속 그룹 제거
                                                targetCol = targetCol <= 2 ? targetCol : targetCol - 10;
                                            }

                                            if (!isVisible) return null; // 영역을 비움 -> Grid의 명시적 Row/Col 위치 덕분에 빈칸으로 완벽 유지됨

                                            const isFilled = taFilled.has(el.n);
                                            const isShake = taWrongFlash.id === el.n;
                                            const isHintGlow = taHintFlash.id === el.n;
                                            
                                            // 기본 스타일 구성
                                            let cellClasses = `rounded-md border flex flex-col items-center justify-center relative overflow-hidden transition-all duration-150 `;
                                            
                                            if (isFilled) {
                                                cellClasses += ` ${el.category.id} border-opacity-100 opacity-100 scale-100 z-10`;
                                            } else {
                                                // 아직 안 채워진 셀 - 카테고리 배경색을 아주 옅게 주어 힌트 제공
                                                cellClasses += ` bg-slate-800 border-slate-600 hover:border-cyan-400 hover:bg-slate-700 cursor-pointer active:scale-95 `;
                                                cellClasses += ` shadow-[inset_0_0_10px_rgba(255,255,255,0.02)] `;
                                            }

                                            if (isShake && Date.now() - taWrongFlash.trigger < 400) {
                                                cellClasses += ` bg-red-950 border-red-500 shake-animation z-20`;
                                            }
                                            if (isHintGlow && Date.now() - taHintFlash.trigger < 1600) {
                                                cellClasses += ` hint-flash-animation`;
                                            }
                                            if (taIsLocked && !isFilled) {
                                                cellClasses += ` opacity-60 pointer-events-none`;
                                            }

                                            return (
                                                <div 
                                                    key={el.n}
                                                    style={{ gridColumn: targetCol, gridRow: el.row }}
                                                    className={cellClasses}
                                                    onClick={() => handleTaCellClick(el.n)}
                                                >
                                                    {isFilled ? (
                                                        // 채워진 정답 셀의 정보
                                                        <>
                                                            <span class="text-[9px] text-slate-300 absolute top-0.5 left-1 leading-none">{el.n}</span>
                                                            <span class="font-bold text-sm text-white leading-tight mt-1">{el.sym}</span>
                                                            <span class="text-[8px] text-slate-200 leading-none mb-0.5">{el.name}</span>
                                                        </>
                                                    ) : (
                                                        // 미답변 빈 셀의 구조적 힌트 (원자 번호 은은하게 표시)
                                                        <>
                                                            <span class="absolute inset-0 flex items-center justify-center text-slate-500/20 text-lg md:text-2xl font-black pointer-events-none z-0">{el.n}</span>
                                                            <div class={`absolute bottom-0 w-full h-1 opacity-40 ${el.category.id.replace('cat-', 'bg-')}`}></div>
                                                        </>
                                                    )}
                                                </div>
                                            );
                                        })}
                                        {/* 란타넘/악티늄족 분리 여백 */}
                                        <div class={`${isCompact ? 'col-span-8' : 'col-span-18'} h-[10px]`} style={{ gridRow: 7 }}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {taView === 'result' && (
                            <div class="max-w-md mx-auto w-full glass-panel rounded-3xl p-8 text-center animate-fade-in relative z-10">
                                <h2 class="text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-fuchsia-500 mb-2">🎉 완주 성공!</h2>
                                <div class="text-5xl font-black text-white mb-2 flex justify-center items-end gap-1">
                                    {taTimer.toFixed(2)}<span class="text-xl text-cyan-400 mb-1">초</span>
                                </div>
                                
                                {taHint !== 'all' && <div class="text-xs text-lime-400 font-bold mb-4">⚡ {taHint === 'name' ? '이름만' : '기호만'} 모드 (-3초 반영)</div>}
                                
                                <div class="flex flex-col gap-1 text-sm text-slate-400 mb-6 bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                                    <div>{GAME_ELEMENTS.filter(e => e.period <= (taDiff==='초급'?0:(taDiff==='중급'?4:(taDiff==='고급'?5:9))) || (taDiff==='초급'&&e.n<=20)).length}개 완료 · {taDiff} 모드</div>
                                    <div class={taWrong > 0 ? "text-red-400" : "text-lime-400"}>{taWrong > 0 ? `오답 ${taWrong}회 발생` : '오답 없이 완벽!'}</div>
                                </div>

                                <div class="bg-slate-950/80 border border-slate-800 rounded-xl p-5 mb-6 text-left">
                                    <div class="text-xs text-slate-500 mb-3 text-center font-bold">🏆 명예의 전당 기록 남기기</div>
                                    <div class="flex flex-col gap-2">
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs text-slate-400 w-10">소속</span>
                                            <input type="text" value="1학교" disabled class="bg-slate-900 border border-slate-700 text-slate-500 px-3 py-2 rounded-lg text-sm flex-grow opacity-70 cursor-not-allowed"/>
                                        </div>
                                        <div class="flex items-center gap-2">
                                            <span class="text-xs text-slate-400 w-10">이름</span>
                                            <input type="text" value={taSubmitName} onChange={(e) => setTaSubmitName(e.target.value)} placeholder="학생 실명 입력" maxLength={12} class="bg-slate-900 border border-slate-700 text-white px-3 py-2 rounded-lg text-sm flex-grow focus:outline-none focus:border-cyan-500 transition-colors" disabled={taSubmitStatus === '완료' || taSubmitStatus === '로딩중'}/>
                                        </div>
                                    </div>
                                    {taSubmitStatus === '' && (
                                        <button onClick={submitTaRanking} class="w-full mt-4 py-2.5 rounded-lg bg-cyan-900/40 border border-cyan-500/50 text-cyan-400 font-bold text-sm hover:bg-cyan-900/60 transition-colors">
                                            통합 DB에 랭킹 제출하기
                                        </button>
                                    )}
                                    {taSubmitStatus === '로딩중' && <div class="mt-4 text-center text-xs text-slate-400 py-2.5">업로드 중...</div>}
                                    {taSubmitStatus === '완료' && <div class="mt-4 text-center text-sm font-bold text-lime-400 py-2.5">✅ 랭킹에 무사히 등재되었습니다!</div>}
                                    {taSubmitStatus === '에러' && <div class="mt-4 text-center text-xs text-red-400 py-2.5">서버 통신 실패. 제출되지 않았습니다.</div>}
                                </div>

                                <div class="flex gap-3 mb-3">
                                    <button onClick={() => setTaView('intro')} class="flex-1 py-3 rounded-xl border border-slate-700 bg-slate-800 text-slate-300 font-bold hover:bg-slate-700 transition-colors text-sm">
                                        처음으로
                                    </button>
                                    <button onClick={startTaGame} class="flex-1 py-3 rounded-xl bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white font-bold hover:opacity-90 transition-opacity text-sm">
                                        🔄 다시 시작
                                    </button>
                                </div>
                                <button onClick={fetchRankings} class="w-full py-3 rounded-xl bg-slate-900 border border-slate-700 text-cyan-400 text-sm font-bold hover:bg-slate-800 active:scale-95 transition-all">
                                    🏆 명예의 전당 보기
                                </button>
                            </div>
                        )}
                    </main>
                );
            };

            return (
                <div class="flex-grow flex flex-col justify-between text-slate-100">
                    
                    {/* 상단 네비게이션 헤더 및 탭 전환 */}
                    <header class="glass-panel border-b border-brand-500/20 px-6 py-4 flex flex-wrap items-center justify-between gap-4 sticky top-0 z-40">
                        <div class="flex items-center gap-3">
                            <span class="text-2xl animate-spin" style={{ animationDuration: '6s' }}>⚛️</span>
                            <div class="hidden sm:block">
                                <h1 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-brand-300 to-sky-100">통합 과학 웹앱</h1>
                                <p class="text-[10px] text-brand-300/80">원자 구조 탐구 & 주기율표 게임</p>
                            </div>
                        </div>

                        {/* 앱 모드 스위치 버튼 */}
                        <div class="flex bg-slate-900/80 p-1 rounded-xl border border-slate-800">
                            <button onClick={() => setMainMode('lab')} class={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${mainMode === 'lab' ? 'bg-brand-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>
                                🧪 원자 실험실
                            </button>
                            <button onClick={() => setMainMode('game')} class={`px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center gap-1 ${mainMode === 'game' ? 'bg-fuchsia-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>
                                ⏱️ 타임어택
                            </button>
                        </div>

                        <div class="flex items-center gap-3">
                            {/* DB 가이드는 두 모드 모두에서 볼 수 있도록 처리 */}
                            <button onClick={() => setShowGuide(true)} class="text-xs bg-slate-900/80 border border-brand-500/30 hover:border-brand-400 text-brand-300 px-3 py-1.5 rounded-lg active:scale-95 transition-all flex items-center gap-1.5 hidden sm:flex">
                                ⚙️ 통합 DB 연동 가이드
                            </button>
                        </div>
                    </header>

                    {/* 모드에 따른 화면 렌더링 분기 */}
                    {mainMode === 'lab' ? renderLab() : renderTimeAttack()}

                    {/* 랭킹 (명예의 전당) 전용 모달 */}
                    {showRankings && (
                        <div class="fixed inset-0 z-[150] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <div class="glass-panel w-full max-w-sm rounded-2xl shadow-2xl border border-cyan-500/30 flex flex-col max-h-[85vh] overflow-hidden">
                                <div class="px-5 py-4 border-b border-slate-800 flex items-center justify-between bg-slate-950/80">
                                    <h3 class="text-lg font-black text-cyan-400">🏆 명예의 전당</h3>
                                    <button onClick={() => setShowRankings(false)} class="text-slate-400 hover:text-white text-xl font-bold">✕</button>
                                </div>
                                <div class="p-5 overflow-y-auto flex-grow flex flex-col gap-3">
                                    {rankingsLoading ? (
                                        <div class="py-10 flex flex-col items-center justify-center text-slate-400">
                                            <div class="w-8 h-8 rounded-full border-2 border-cyan-500/30 border-t-cyan-400 animate-spin mb-3"></div>
                                            구글 DB에서 랭킹을 불러오는 중...
                                        </div>
                                    ) : rankingsData.length === 0 ? (
                                        <div class="py-10 text-center text-slate-400 text-sm">아직 등록된 타임어택 기록이 없습니다.</div>
                                    ) : (
                                        rankingsData.map((rank, idx) => (
                                            <div key={idx} class="bg-slate-900/60 border border-slate-800 rounded-xl p-3 flex items-center justify-between">
                                                <div class="flex items-center gap-3">
                                                    <div class={`w-6 text-center font-black ${idx === 0 ? 'text-yellow-400 text-lg' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-amber-600' : 'text-slate-500'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div class="flex flex-col">
                                                        <span class="font-bold text-sm text-white">{rank.name}</span>
                                                        <span class="text-[10px] text-slate-400">{rank.diff} 모드 / {rank.hint === 'all' ? '전체' : rank.hint === 'name' ? '이름' : '기호'}</span>
                                                    </div>
                                                </div>
                                                <div class="text-right text-cyan-400 font-mono font-bold">{rank.time.toFixed(2)}초</div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <div class="p-4 bg-slate-950/80 border-t border-slate-800">
                                    <button onClick={() => setShowRankings(false)} class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2.5 rounded-lg text-sm transition-colors">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 교사용 구글 스프레드시트 통합 연동 가이드 모달 */}
                    {showGuide && (
                        <div class="fixed inset-0 z-[250] bg-black/75 backdrop-blur-sm flex items-center justify-center p-4">
                            <div class="glass-panel w-full max-w-2xl rounded-2xl shadow-2xl border border-brand-500/30 flex flex-col max-h-[90vh] overflow-hidden">
                                <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between bg-slate-950/80">
                                    <h3 class="text-base font-bold text-brand-300 flex items-center gap-2"><span>⚙️</span> 교사용 구글 DB 통합 연동 가이드</h3>
                                    <button onClick={() => setShowGuide(false)} class="text-slate-400 hover:text-slate-100 text-xl font-bold w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-900">✕</button>
                                </div>
                                <div class="p-6 overflow-y-auto text-xs leading-relaxed text-slate-300 flex flex-col gap-5">
                                    <div>
                                        <p class="mb-2 text-sm text-slate-100 font-semibold">1단계. Apps Script 소스 입력 (시트와 헤더가 자동 생성됩니다)</p>
                                        <p class="mb-2">스크립트 에디터에 기존 내용을 모두 지우고 아래 코드를 정확히 복사해서 붙여넣습니다. (실행 시 '실험실_보고서' 탭과 '타임어택_랭킹' 탭이 자동으로 나뉘어 기록됩니다)</p>
                                        <div class="relative">
                                            <pre class="bg-slate-950 p-4 rounded-lg overflow-x-auto font-mono text-[11px] text-emerald-400 border border-slate-800 max-h-64 whitespace-pre">
{APP_SCRIPT_CODE}
                                            </pre>
                                            <button onClick={handleCopyCode} class="absolute top-2 right-2 bg-brand-600 hover:bg-brand-500 text-white font-bold px-3 py-1.5 rounded-lg shadow-md text-xs transition-colors">
                                                {copied ? "✅ 복사 완료!" : "📄 전체 코드 복사"}
                                            </button>
                                        </div>
                                    </div>
                                    <div class="bg-brand-500/10 border border-brand-500/30 p-3 rounded-xl text-[11px] text-brand-200">
                                        <p class="font-bold mb-1">🔗 연동 방법 (필수):</p>
                                        [웹 앱] 배포를 통해 얻은 긴 URL 주소를 본 HTML 파일 102번째 줄 부근의 <span class="font-mono font-bold bg-slate-900 px-1 py-0.5 rounded text-fuchsia-400">const GOOGLE_SCRIPT_URL = "여기에 입력";</span> 란에 기입하시면 실험실 보고서 및 명예의 전당 기능이 자동으로 완전 활성화됩니다.
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 자체 제작 커스텀 얼럿 모달 */}
                    {customAlert && (
                        <div class="fixed inset-0 z-[300] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-brand-500/30 w-full max-w-sm rounded-xl overflow-hidden shadow-2xl">
                                <div class="p-4 bg-slate-950 border-b border-slate-800"><h4 class="font-bold text-sm text-brand-300">{customAlert.title}</h4></div>
                                <div class="p-4"><p class="text-xs text-slate-300 leading-relaxed">{customAlert.message}</p></div>
                                <div class="p-3 bg-slate-950 flex justify-end">
                                    <button onClick={closeCustomAlert} class="bg-brand-600 hover:bg-brand-500 text-slate-950 font-bold text-xs px-4 py-2 rounded-lg active:scale-95 transition-all">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 로딩 스피너 */}
                    {isLoading && (
                        <div class="fixed inset-0 z-[200] bg-black/80 flex flex-col items-center justify-center gap-3">
                            <div class="w-12 h-12 rounded-full border-4 border-brand-500/30 border-t-brand-400 animate-spin"></div>
                            <p class="text-sm font-bold text-brand-300">구글 시트로 학생 기록 업로드 처리 중...</p>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
